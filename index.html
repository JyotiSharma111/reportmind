    <!-- Structured Data — SoftwareApplication + FAQ (AEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "ReportMind",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://reportmind.visull.com",
          "description": "ReportMind automates monthly client reporting for marketing agencies. It pulls live data from Google Ads, GA4, and Search Console, then uses AI to write the client email narrative in 45 seconds.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Free plan available, Pro from $49/month"
          },
          "publisher": {
            "@type": "Organization",
            "name": "Visull",
            "url": "https://visull.com"
          },
          "featureList": [
            "Google Ads data sync",
            "GA4 traffic reporting",
            "Search Console integration",
            "AI-written client narratives",
            "White-label PDF exports",
            "Multi-client workspace"
          ],
          "screenshot": "https://reportmind.visull.com/og-image.png"
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How does ReportMind save time on client reporting?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "ReportMind connects to Google Ads, GA4, and Search Console via OAuth, pulls the latest campaign and traffic data, then uses AI to write the client email narrative. A task that typically takes 4–8 hours per client per month is done in 45 seconds."
              }
            },
            {
              "@type": "Question",
              "name": "What data sources does ReportMind connect to?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "ReportMind connects to Google Ads, Google Analytics 4 (GA4), and Google Search Console using read-only OAuth. Your client's data is never modified — only read."
              }
            },
            {
              "@type": "Question",
              "name": "Is ReportMind free to use?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. ReportMind has a free plan that includes 3 client workspaces and all core features. The Pro plan at $49/month includes 10 client workspaces, white-label PDFs, custom branding, and automated scheduling."
              }
            },
            {
              "@type": "Question",
              "name": "Who is ReportMind for?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "ReportMind is built for marketing agencies and freelancers who manage multiple clients and produce monthly performance reports. If you spend hours every month pulling data from Google Ads, GA4, and Search Console and writing it up — ReportMind is for you."
              }
            },
            {
              "@type": "Question",
              "name": "Can I white-label ReportMind reports?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. On the Pro plan you can add your agency logo and branding to PDF exports. Clients see your agency brand, not ReportMind."
              }
            }
          ]
        }
      ]
    }
    </script>
